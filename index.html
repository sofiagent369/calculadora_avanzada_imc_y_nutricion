<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced BMI and Nutrition Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Advanced BMI and Nutrition Calculator</h1>
        <form id="calculator-form">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" required>

            <label for="height">Height (cm):</label>
            <input type="number" id="height" name="height" required>

            <button type="submit">Calculate BMI</button>
        </form>

        <div id="results">
            <h2>Results</h2>
            <p>Your BMI: <span id="bmi-value"></span></p>
            <p>Nutritional Status: <span id="nutritional-status"></span></p>
        </div>

        <section id="charts">
            <h3>BMI History Chart</h3>
            <canvas id="bmi-chart" width="400" height="200"></canvas>
        </section>

        <section id="history">
            <h3>Calculation History</h3>
            <ul id="calculation-list"></ul>
        </section>

        <button id="export-pdf">Export to PDF</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="scripts/calculator.js"></script>
</body>
</html>
